<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PagePeel</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="cl-header">
      <div class="cl-brand">
        <img src="../icons/icon32.png" alt="" width="22" height="22" />
        <h1>PagePeel</h1>
      </div>
      <button id="open-options" class="cl-icon-button" title="Settings (Alt+Shift+E to extract without opening popup)" aria-label="Open settings">
        <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
          <path fill="currentColor" d="M9.31 2H6.69l-.34 1.65a4.99 4.99 0 0 0-1.46.85l-1.6-.5L1.97 6.27l1.27 1.07a5 5 0 0 0 0 1.32L1.97 9.73l1.32 2.27 1.6-.5c.43.36.92.65 1.46.85L6.69 14h2.62l.34-1.65a4.99 4.99 0 0 0 1.46-.85l1.6.5 1.32-2.27-1.27-1.07a5 5 0 0 0 0-1.32l1.27-1.07L12.71 4l-1.6.5a4.99 4.99 0 0 0-1.46-.85L9.31 2ZM8 10.5A2.5 2.5 0 1 1 8 5.5a2.5 2.5 0 0 1 0 5Z"/>
        </svg>
      </button>
    </header>

    <section class="cl-status" id="status-row" role="status" aria-live="polite">
      <span class="cl-dot" id="status-dot" data-state="loading"></span>
      <span id="status-text">Extracting…</span>
    </section>

    <section class="cl-cta" aria-label="Save extraction">
      <button id="btn-md" class="cl-cta-btn" disabled
              title="Extracting page — buttons enable when complete">
        <span class="cl-cta-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </span>
        <span class="cl-cta-stack">
          <span class="cl-cta-label">Save as Markdown</span>
          <span class="cl-cta-sub" id="cta-sub" hidden></span>
        </span>
      </button>
      <div class="cl-cta-secondary">
        <button id="btn-json" class="cl-btn-link" disabled
                title="Extracting page — buttons enable when complete">Save as JSON</button>
        <span class="cl-secondary-sep" aria-hidden="true">·</span>
        <button id="btn-copy" class="cl-btn-link" disabled
                title="Extracting page — buttons enable when complete">Copy to clipboard</button>
      </div>
    </section>

    <section class="cl-warning" id="warning-row" role="alert" aria-live="assertive" hidden></section>

    <details class="cl-preview-disclosure" id="preview-disclosure">
      <summary class="cl-preview-summary">
        <span class="cl-preview-summary-label">Preview</span>
        <span class="cl-preview-summary-hint" id="preview-hint">first part of the extraction</span>
      </summary>
      <div class="cl-preview-wrap">
        <div class="cl-preview" id="preview" aria-label="Extracted content preview"></div>
      </div>
    </details>

    <details class="cl-preview-disclosure" id="stripped-disclosure" hidden>
      <summary class="cl-preview-summary">
        <span class="cl-preview-summary-label">What was removed</span>
        <span class="cl-preview-summary-hint" id="stripped-summary"></span>
      </summary>
      <div class="cl-preview-wrap">
        <ul class="cl-stripped-list" id="stripped-list"></ul>
        <div class="cl-detail-stats" id="detail-stats" hidden>
          <span class="cl-detail-row"><span class="cl-detail-key">Words</span><strong id="m-words">—</strong></span>
          <span class="cl-detail-row"><span class="cl-detail-key">Characters</span><strong id="m-chars">—</strong></span>
          <span class="cl-detail-row"><span class="cl-detail-key">Estimated tokens</span><strong id="m-tokens">—</strong></span>
        </div>
      </div>
    </details>


    <script src="popup.js"></script>
  </body>
</html>
